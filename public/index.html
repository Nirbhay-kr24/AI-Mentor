<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Mentor Studio</title>
<link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-shell">

<header class="header">
  <div class="brand">
    <div class="brand-badge">AI</div>
    <div>
      <h1>AI Mentor</h1>
      <p>Conversations with industry leaders</p>
    </div>
  </div>
</header>

<section class="persona-selector">
  <button class="persona-btn active" data-persona="anshuman">
    <span class="persona-avatar">AS</span>
    <div class="persona-meta">
      <span class="persona-name">Anshuman Singh</span>
      <span class="persona-role">Engineering Mentor</span>
    </div>
  </button>

  <button class="persona-btn" data-persona="kshitij">
    <span class="persona-avatar">KM</span>
    <div class="persona-meta">
      <span class="persona-name">Kshitij Mishra</span>
      <span class="persona-role">Career Mentor</span>
    </div>
  </button>

  <button class="persona-btn" data-persona="abhimanyu">
    <span class="persona-avatar">AB</span>
    <div class="persona-meta">
      <span class="persona-name">Abhimanyu Saxena</span>
      <span class="persona-role">Startup Mentor</span>
    </div>
  </button>
</section>

<main class="chat-container">

<div class="chat-messages" id="chatMessages">
  <div class="welcome-message">
    <div class="welcome-badge">AI Mentor Chat</div>
    <h2>Start a Conversation</h2>
    <p id="personaWelcome">Ask Anshuman Singh about growth, careers and learning.</p>
  </div>
</div>

<div class="suggestions" id="suggestions">
  <div class="suggestions-label">Suggested prompts</div>
  <div class="suggestion-chips" id="suggestionChips"></div>
</div>

<div class="chat-input-area">
  <div class="input-wrapper">
    <input
      type="text"
      id="chatInput"
      class="chat-input"
      placeholder="Ask a thoughtful question..."
      autocomplete="off"
    >
    <button class="send-btn" id="sendBtn">
      <span class="send-icon">➜</span>
    </button>
  </div>
</div>

</main>

</div>

<script src="script.js"></script>
</body>
</html>
